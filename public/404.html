<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Introuvable</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="snack-config.js"></script>

  </head>
  <body id="error-body" class="min-h-screen flex items-center justify-center p-4 transition-colors duration-500 loading">
    
    <div class="max-w-md w-full text-center relative z-10">
      
      <img id="error-logo" src="" alt="Logo" class="h-24 mx-auto mb-8 hidden rounded-md">
      
      <div class="mb-8">
        <i class="fas fa-hamburger text-6xl opacity-50 mb-4 animate-bounce" id="error-icon"></i>
        <h1 class="text-7xl font-black tracking-tighter mb-2" id="error-title">404</h1>
        <h2 class="text-2xl font-bold mb-4" id="error-subtitle">Oups ! Ce produit s'est perdu...</h2>
        <p class="text-lg opacity-75" id="error-desc">La page que vous cherchez n'existe plus ou a probablement été mangée par notre équipe.</p>
      </div>
      
      <a href="/" id="error-btn" class="inline-flex items-center justify-center gap-2 px-8 py-4 rounded-full font-bold text-lg shadow-xl transform hover:scale-105 transition-all w-full sm:w-auto">
        <i class="fas fa-arrow-left"></i> Retour au Menu
      </a>
    </div>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Sécurité : on vérifie que la config est bien là
            if (typeof snackConfig === 'undefined') return;
            
            const cfg = snackConfig;
            const body = document.getElementById('error-body');
            const btn = document.getElementById('error-btn');
            const logo = document.getElementById('error-logo');
            const title = document.querySelector('title');

            // 1. Mise à jour du Titre
            title.innerText = `404 - ${cfg.identity.name}`;

            // 2. Thème (Sombre ou Clair selon ton choix dans la config)
            if (cfg.theme.templateId === 'neon-vibes') {
                body.classList.add('bg-gray-900', 'text-white');
                document.getElementById('error-icon').classList.add('text-white');
            } else {
                body.classList.add('bg-gray-50', 'text-gray-900');
                document.getElementById('error-icon').classList.add('text-gray-900');
            }

            // 3. Couleurs du bouton (Prend la couleur primaire de ton snack !)
            btn.className += ` ${cfg.theme.colors.primary} text-white`;

           // 4. Logo du resto (Gestion intelligente Local vs Prod)
            if (cfg.identity.logoUrl) {
                let urlLogo = cfg.identity.logoUrl;
                
                // Si c'est une image locale (ne commence pas par http)
                if (!urlLogo.startsWith('http')) {
                    // Nettoyage du "./" au début
                    if (urlLogo.startsWith('./')) {
                        urlLogo = urlLogo.substring(1);
                    }
                    // Ajout du slash racine
                    if (!urlLogo.startsWith('/')) {
                        urlLogo = '/' + urlLogo;
                    }
                    
                    // 🪄 LE FIX MAGIQUE : Gestion du Live Server vs Firebase Prod
                    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                    const isInsidePublicDir = window.location.pathname.startsWith('/public/');
                    
                    // Si on est en local ET dans le dossier public, on ajuste le chemin
                    if (isLocalhost && isInsidePublicDir) {
                        urlLogo = '/public' + urlLogo;
                    }
                    // (En production, Firebase utilise déjà le dossier public comme racine, donc on ne fait rien !)
                }
                
                logo.src = urlLogo;
                logo.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
