name: 🚀 CI/CD - Déploiement Firebase (Fast & Furious)

on:
  push:
    branches:
      - main

jobs:
  # =========================================================
  # 📦 DÉPLOIEMENT MATRIX (MULTI-CLIENTS)
  # =========================================================
  deploy:
    name: 🚀 Déploiement (${{ matrix.snack_id }})
    # 🛑 On a retiré le "needs: test" ici ! Le job se lance tout de suite.
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false # Si un resto plante au build, on déploie quand même les autres
      matrix:
        include:
          - site_name: snacking-template
            snack_db_id: Ym1YiO4Ue5Fb5UXlxr06
          - site_name: o-bois-pizza
            snack_db_id: PsobiuoeUzNmHnwGtaRu # 👈 Ta liste de clients s'allongera ici !

steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        env:
          SNACK_ID: ${{ matrix.snack_db_id }}
        run: |
          npm run build
          # 💡 ÉTAPE CLÉ : On renomme le dossier de build vers un nom générique 
          # pour que firebase.json le trouve à chaque fois
          mv dist/${{ matrix.snack_db_id }} dist-deploy

      - name: 🚀 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SNACKING_TEMPLATE }}"
          channelId: live
          projectId: snacking-template
          # 💡 On dit à l'action quel SITE réel correspond à notre target "current-snack"
          target: current-snack
        env:
          # On fait le lien entre la target et le site réel (ex: o-bois-pizza)
          FIREBASE_CLI_PREDEPLOY: npx firebase target:apply hosting current-snack ${{ matrix.site_name }}