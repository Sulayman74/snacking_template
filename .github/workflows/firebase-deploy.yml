name: 🚀 CI/CD - Tests & Déploiement Firebase

on:
  push:
    branches:
      - main

jobs:
  # =========================================================
  # 🛡️ ÉTAPE 1 : LE GARDE DU CORPS (TESTS PLAYWRIGHT)
  # =========================================================
  test:
    name: 🤖 Tests E2E
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Télécharger le code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Excellente idée d'utiliser la version 24 LTS

      - name: 📦 Installer les dépendances
        run: npm ci # 'ci' est plus rapide et strict que 'install' pour les serveurs

      - name: 🌐 Installer les navigateurs Playwright
        run: npx playwright install --with-deps

      - name: 🧪 Lancer l'armée de robots
        run: npx playwright test

      - name: 📊 Sauvegarder le rapport (en cas de crash)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # =========================================================
  # 📦 ÉTAPE 2 : LE DÉPLOIEMENT MATRIX (MULTI-CLIENTS)
  # =========================================================
  deploy:
    name: 🚀 Déploiement (${{ matrix.snack_id }})
    needs: test # 🛑 LE SECRET EST ICI : Ce job attend que 'test' finisse avec succès !
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false # Si un resto plante au build, on déploie quand même les autres
      matrix:
        snack_id: [Ym1YiO4Ue5Fb5UXlxr06] # 👈 Ta liste de clients

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build project pour ${{ matrix.snack_id }}
        env:
          SNACK_ID: ${{ matrix.snack_id }}
        run: npm run build

      - name: 🚀 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SNACKING_TEMPLATE }}"
          channelId: live
          projectId: snacking-template
          target: ${{ matrix.snack_id }}