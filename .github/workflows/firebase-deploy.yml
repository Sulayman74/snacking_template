name: 🚀 CI/CD — Deploy Firebase Hosting (multi-clients)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # si tacos plante, pizza continue quand même
      matrix:
        include:
          - target: snacking-template
            snack_id: Ym1YiO4Ue5Fb5UXlxr06
          # ── Décommenter quand le site Firebase Hosting est créé + .firebaserc mis à jour ──
          # - target: demo-pizza
          #   snack_id: PsobiuoeUzNmHnwGtaRu
          # - target: demo-client3
          #   snack_id: REMPLACER_SNACK_ID_CLIENT3

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      # Build avec SNACK_ID → dist/<snack_id>/ (utilisé tel quel par firebase.json)
      - name: 🏗️ Build — ${{ matrix.snack_id }}
        env:
          SNACK_ID: ${{ matrix.snack_id }}
        run: npm run build

      # Auth via le service account stocké dans les secrets GitHub
      - name: 🔑 Google auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SNACKING_TEMPLATE }}

      # Déploie uniquement le site correspondant au target de la matrice
      - name: 🚀 Firebase deploy — ${{ matrix.target }}
        run: npx firebase-tools@latest deploy --only hosting:${{ matrix.target }} --project snacking-template
