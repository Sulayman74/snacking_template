name: 🤖 Tests Automatiques (Playwright)

on:
  # 1. Le déclencheur Manuel : Un bouton direct sur GitHub pour lancer quand tu veux
  workflow_dispatch:
    
  # 2. Le "Nightly Build" : S'exécute tous les jours à 03h00 du matin (Heure UTC)
  schedule:
    - cron: '0 3 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4
    
    - name: 🟢 Installation de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: 📦 Installation des dépendances
      run: npm ci # Plus rapide et strict que npm install

    - name: 🌐 Installation des navigateurs Playwright
      run: npx playwright install --with-deps

    - name: 🧪 Lancement des tests E2E
      run: npx playwright test

    # 🚨 LA PREUVE EN CAS DE CRASH : Sauvegarde de la vidéo/capture d'écran
    - name: 📁 Sauvegarde du rapport Playwright
      uses: actions/upload-artifact@v4
      if: always() # S'exécute toujours, même si le test a planté !
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7