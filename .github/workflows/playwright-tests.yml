name: 🤖 Tests Automatiques (Playwright)

on:
  # Uniquement le bouton manuel sur GitHub !
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4
    
    - name: 🟢 Installation de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Attention: la version 24 n'est pas encore stable, je vous conseille la 20 (LTS)

    - name: 📦 Installation des dépendances
      run: npm ci

    - name: 🌐 Installation des navigateurs Playwright
      run: npx playwright install --with-deps

    - name: 🧪 Lancement des tests E2E
      # 💡 L'ASTUCE EST ICI : On injecte une variable d'environnement pour prévenir notre app
      env:
        VITE_E2E_TESTING: "true"
      run: npx playwright test

    - name: 📁 Sauvegarde du rapport Playwright
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7