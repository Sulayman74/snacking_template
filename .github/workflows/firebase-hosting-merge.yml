# ⚠️ Workflow auto-généré par Firebase CLI — désactivé.
# Le déploiement multi-clients est géré par firebase-deploy.yml.
# Conserver ce fichier pour référence ou réactiver manuellement si besoin.

name: Deploy to Firebase Hosting on merge (désactivé)
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Raison du déploiement manuel"
        required: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Build Project
        run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SNACKING_TEMPLATE }}'
          channelId: live
          projectId: snacking-template
