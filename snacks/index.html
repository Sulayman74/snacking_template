<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#DC2626" id="theme-color-meta">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* Transitions douces pour l'apparition des éléments */
        .fade-in { animation: fadeIn 0.5s ease-in forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Pour masquer le contenu tant que la config n'est pas chargée */
        body.loading { opacity: 0; }
        body.loaded { opacity: 1; transition: opacity 0.5s ease; }
    </style>
</head>
<body class="loading bg-gray-50 text-gray-800">

    <nav id="navbar" class="fixed w-full z-50 top-0 transition-all duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="#" class="flex items-center gap-2">
                <img id="nav-logo" src="" alt="Logo" class="h-10 w-10 object-contain hidden">
                <span id="nav-name" class="text-xl font-bold uppercase tracking-wider"></span>
            </a>
            
            <button class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>

            <div class="hidden md:flex items-center gap-6">

                <a href="#infos" class="hover:text-gray-300 transition">Infos</a>

    <header id="hero" class="relative h-[80vh] flex items-center justify-center bg-cover bg-center">

                </span>
            <h1 id="hero-title" class="text-5xl md:text-7xl font-bold mb-6 leading-tight"></h1>
            <p id="hero-desc" class="text-xl md:text-2xl mb-8 font-light text-gray-200"></p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">

    <section id="menu" class="py-20">

        </div>
    </section>

    <section id="loyalty" class="py-20 hidden">

                <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                    <div class="text-center md:text-left">

                        <p class="mb-6 opacity-90" id="loyalty-desc">Gagnez des points à chaque commande !</p>
                        <div class="flex gap-4 justify-center md:justify-start">

                            </button>
                        </div>
                    </div>
                    <div class="text-6xl">

                    </div>
                </div>

    <footer id="infos" class="bg-gray-900 text-white py-16">

                <p id="footer-phone" class="text-lg mb-4"></p>
                <div id="socials-container" class="flex gap-4 text-2xl"></div>
            </div>

            <div>
                <h4 class="text-xl font-bold mb-6 text-gray-400 uppercase">Horaires</h4>

            </div>

            <div class="text-center md:text-right">

    <script src="snack-config.js"></script> <script src="app.js"></script>

    <a href="#menu" class="flex flex-col items-center text-gray-400 hover:text-white transition">

</div>
