<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Dashboard Admin - Team Fusion</title>

    <meta name="robots" content="noindex, nofollow" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
        <link rel="stylesheet" href="src/styles.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body
    class="bg-gray-100 text-gray-900 font-sans h-screen flex flex-col overflow-hidden"
  >
    <audio
      id="kitchen-bell"
      src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
      preload="auto"
    ></audio>

    <div
      id="startup-overlay"
      class="fixed inset-0 bg-gray-900 z-[100] flex flex-col items-center justify-center text-white p-6 transition-opacity duration-500"
    >
      <i class="fas fa-lock text-6xl mb-6 text-gray-500" id="startup-icon"></i>
      <h1 class="text-3xl font-black mb-2 text-center" id="startup-title">
        Vérification de l'accès...
      </h1>
      <p class="text-gray-400 mb-8 text-center" id="startup-desc">
        Veuillez patienter.
      </p>
      <button
        id="start-shift-btn"
        class="hidden bg-green-600 hover:bg-green-700 text-white font-bold text-2xl py-6 px-12 rounded-2xl shadow-[0_0_30px_rgba(22,163,74,0.4)] animate-pulse transition transform hover:scale-105"
      >
        <i class="fas fa-play mr-3"></i> DÉMARRER LE SERVICE
      </button>
      <a
        href="index.html"
        id="back-home-btn"
        class="hidden mt-6 text-red-400 hover:text-red-300 underline"
        >Retour au site public</a
      >
      <div id="admin-login-section" class="hidden w-full max-w-sm mx-auto flex-col items-center mt-6">
    <h2 class="text-2xl text-gray-300 mb-6">Accès Équipe</h2>
    <form id="admin-login-form" class="w-full flex flex-col gap-4">
        <input type="email" id="admin-email-input" placeholder="Email professionnel" class="p-4 bg-gray-50 text-blue-700 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black outline-none transition" required>
        <input type="password" id="admin-password-input" placeholder="Mot de passe" class="p-4 bg-gray-50 text-blue-700 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black outline-none transition" required>
        
        <button type="submit" id="admin-login-btn" class="w-full bg-gray-700 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-gray-800 transition transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2">
            <span class="text-blue-700">Connexion</span>
        </button>
    </form>
    <p id="admin-login-error" class="text-red-500 text-sm mt-4 font-bold hidden text-center"></p>
</div>
    </div>

    <header class="bg-gray-900 text-white shadow-lg z-50 sticky top-0">
      <div
        class="p-4 flex justify-between items-center border-b border-gray-800"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,197,94,0.8)]"
          ></div>
          <h1 class="text-xl md:text-2xl font-black uppercase tracking-widest">
            Admin <span class="text-red-500">Fusion</span>
          </h1>
        </div>
        <div class="flex items-center gap-4">
          <span
            id="admin-email"
            class="hidden md:inline font-mono text-sm text-gray-400"
            >admin@...</span
          >
          <button
            onclick="logoutAdmin()"
            class="bg-gray-800 hover:bg-red-600 border border-gray-700 px-4 py-2 rounded-xl font-bold transition"
            aria-label="Se déconnecter"
          >
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
      <div class="flex justify-center bg-gray-800 p-2 gap-2 overflow-x-auto">
        <button
          onclick="switchAdminTab('cuisine')"
          id="tab-cuisine"
          class="bg-gray-900 text-white px-6 py-2 rounded-lg font-bold shadow transition flex-1 md:flex-none"
        >
          <i class="fas fa-fire text-red-500 mr-2"></i> Commandes
        </button>
        <button
          onclick="switchAdminTab('menu')"
          id="tab-menu"
          class="text-gray-400 hover:text-white hover:bg-gray-700 px-6 py-2 rounded-lg font-bold transition flex-1 md:flex-none"
        >
          <i class="fas fa-hamburger text-yellow-500 mr-2"></i> Menu & Stocks
        </button>
      </div>
    </header>

    <main
      id="view-cuisine"
      class="flex-1 overflow-x-auto p-4 md:p-6 flex flex-col md:flex-row gap-6 h-[calc(100vh-140px)]"
    >
      <div
        class="flex-1 min-w-[300px] bg-gray-200 rounded-2xl p-4 flex flex-col max-h-full border border-gray-300"
      >
        <div
          class="flex justify-between items-center mb-4 border-b border-gray-300 pb-3"
        >
          <h2 class="text-xl font-black text-gray-800 uppercase">
            <i class="fas fa-fire text-red-600 mr-2"></i> À Préparer
          </h2>
          <span
            id="count-new"
            class="bg-red-600 text-white font-bold px-3 py-1 rounded-lg"
            >0</span
          >
        </div>
        <div
          id="orders-new"
          class="flex-1 overflow-y-auto space-y-4 pr-2 pb-20 md:pb-0"
        ></div>
      </div>
      <div
        class="flex-1 min-w-[300px] bg-gray-200 rounded-2xl p-4 flex flex-col max-h-full border border-gray-300"
      >
        <div
          class="flex justify-between items-center mb-4 border-b border-gray-300 pb-3"
        >
          <h2 class="text-xl font-black text-gray-800 uppercase">
            <i class="fas fa-check-circle text-green-600 mr-2"></i> Prêtes
          </h2>
          <span
            id="count-ready"
            class="bg-green-600 text-white font-bold px-3 py-1 rounded-lg"
            >0</span
          >
        </div>
        <div
          id="orders-ready"
          class="flex-1 overflow-y-auto space-y-4 pr-2 pb-20 md:pb-0"
        ></div>
      </div>
    </main>

    <main
      id="view-menu"
      class="hidden flex-1 overflow-y-auto p-4 md:p-6 bg-gray-100 h-[calc(100vh-140px)]"
    >
      <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
          <div>
            <h2 class="text-3xl font-black text-gray-900 tracking-tight">
              Votre Carte
            </h2>
            <p class="text-gray-500">
              Gérez vos prix, ruptures de stocks et photos.
            </p>
          </div>
        </div>

        <div
          id="admin-products-grid"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"
        >
          <p class="text-gray-500 font-bold">
            <i class="fas fa-spinner fa-spin mr-2"></i> Chargement des
            produits...
          </p>
        </div>
      </div>
    </main>

    <div
      id="edit-product-modal"
      class="fixed inset-0 bg-gray-900/80 z-[110] hidden flex flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300 opacity-0"
    >
      <div
        class="bg-white w-full max-w-lg rounded-3xl p-6 relative shadow-2xl transform transition-transform scale-95 max-h-[90vh] overflow-y-auto"
      >
        <button
          onclick="closeEditModal()"
          class="absolute top-4 right-4 text-gray-400 hover:text-black bg-gray-100 p-2 rounded-full transition z-10"
        >
          <i
            class="fas fa-times text-xl w-5 h-5 flex justify-center items-center"
          ></i>
        </button>

        <h3
          class="text-2xl font-black text-gray-900 mb-6 border-b pb-4"
          id="edit-modal-title"
        >
          Modifier le produit
        </h3>

        <form id="edit-product-form" class="space-y-5">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2"
              >Photo du produit</label
            >
            <div class="flex items-center gap-4">
              <div class="relative w-20 h-20 shrink-0">
                <img
                  id="edit-preview-img"
                  src=""
                  alt="Aperçu"
                  onerror="
                    this.style.display = 'none';
                    this.nextElementSibling.style.display = 'flex';
                  "
                  class="absolute inset-0 w-full h-full rounded-xl object-cover shadow-sm border border-gray-200 z-10"
                />

                <div
                  id="edit-preview-fallback"
                  class="absolute inset-0 rounded-xl bg-gray-100 shadow-inner flex items-center justify-center border border-gray-200 z-0"
                >
                  <i class="fas fa-camera text-gray-300 text-2xl"></i>
                </div>
              </div>

              <input
                type="file"
                id="edit-img-file"
                accept="image/*"
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-gray-900 file:text-white hover:file:bg-black transition cursor-pointer"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2"
              >Description</label
            >
            <textarea
              id="edit-desc"
              rows="3"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-red-500 focus:ring-2 focus:ring-red-200 outline-none transition text-black"
            ></textarea>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2"
                >Prix Seul (€)</label
              >
              <input
                type="number"
                step="0.10"
                id="edit-prix"
                required
                class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-red-500 focus:ring-2 focus:ring-red-200 outline-none transition text-black font-bold"
              />
            </div>
            <div>
              <label class="block text-sm font-bold text-red-600 mb-2"
                >Surplus Menu (€)</label
              >
              <input
                type="number"
                step="0.10"
                id="edit-prix-menu"
                required
                class="w-full px-4 py-3 rounded-xl bg-red-50 border border-red-200 focus:border-red-500 focus:ring-2 focus:ring-red-200 outline-none transition text-red-700 font-bold"
              />
            </div>
          </div>

          <button
            type="submit"
            id="save-product-btn"
            class="w-full py-4 mt-4 bg-green-600 text-white rounded-xl font-bold shadow-lg hover:bg-green-700 transition flex items-center justify-center gap-2"
          >
            <i class="fas fa-save"></i> Enregistrer
          </button>
        </form>
      </div>
    </div>
    <script type="module" src="src/admin.js"></script>
  </body>
</html>
